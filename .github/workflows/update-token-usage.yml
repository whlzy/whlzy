name: Update token usage panel

on:
  workflow_dispatch:

# Daily updates are scheduled by launchd on the Mac that owns the local usage
# logs. Keep this workflow as a manual fallback only so two schedulers cannot
# modify the same profile repository at the same time.

permissions:
  contents: write

concurrency:
  group: token-usage-panel
  cancel-in-progress: false

env:
  CODEX_HOME: ${{ vars.CODEX_HOME }}
  CLAUDE_CONFIG_DIR: ${{ vars.CLAUDE_CONFIG_DIR }}

jobs:
  update:
    name: Generate and commit profile panel
    runs-on: [self-hosted, macOS]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify local usage logs are available
        shell: bash
        run: |
          roots=()

          if [[ -n "${CODEX_HOME:-}" ]]; then
            roots+=("${CODEX_HOME}/sessions" "${CODEX_HOME}/archived_sessions")
          fi

          roots+=(
            "${HOME}/.codex/sessions"
            "${HOME}/.codex/archived_sessions"
            "${HOME}/.codex-api/sessions"
            "${HOME}/.codex-api/archived_sessions"
          )

          if [[ -n "${CLAUDE_CONFIG_DIR:-}" ]]; then
            IFS=',' read -ra claude_roots <<< "${CLAUDE_CONFIG_DIR}"
            for root in "${claude_roots[@]}"; do
              [[ -z "${root}" ]] && continue
              if [[ "${root}" == */projects ]]; then
                roots+=("${root}")
              else
                roots+=("${root}/projects")
              fi
            done
          fi

          roots+=(
            "${HOME}/.claude/projects"
            "${HOME}/.config/claude/projects"
            "${HOME}/.claude/transcripts"
          )

          found=0
          for root in "${roots[@]}"; do
            if [[ -d "${root}" ]] && find "${root}" -type f -name '*.jsonl' -print -quit | grep -q .; then
              echo "Found local usage logs in ${root}"
              found=1
            fi
          done

          if [[ "${found}" -ne 1 ]]; then
            echo "::error::No local Codex or Claude JSONL logs were found. Run this workflow on a self-hosted Mac runner under the same user that owns the logs, or set CODEX_HOME / CLAUDE_CONFIG_DIR repository variables."
            exit 1
          fi

      - name: Update panel if due
        shell: bash
        run: bash scripts/update-profile-if-due.sh
